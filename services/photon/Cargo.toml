[package]
default-run = "photon"
description = "Solana indexer for Rings"
edition = "2021"
license = "Apache-2.0"
name = "photon-indexer"
publish = true
readme = "README.md"
repository = "https://github.com/helius-labs/photon-privacy"
rust-version = "1.95.0"
version = "0.51.2"

[[bin]]
name = "photon"
path = "src/main.rs"

[[bin]]
name = "photon-migration"
path = "src/migration/main.rs"

[[bin]]
name = "photon-openapi"
path = "src/openapi/main.rs"

[[bin]]
name = "photon-snapshotter"
path = "src/snapshot/snapshotter/main.rs"

[[bin]]
name = "photon-snapshot-loader"
path = "src/snapshot/loader/main.rs"

[dependencies]
ark-bn254 = "0.5"

anyhow = "1.0.102"
async-trait = "0.1.89"
base64 = "0.22.1"
borsh = "0.10.4"
borsh1 = { package = "borsh", version = "1.7.0" }
bs58 = "0.5.1"
cadence-macros = "1.8.0"
clap = { "version" = "4.6.1", features = ["derive"] }
futures = "0.3.32"
hyper = "1.10.1"
hyper-util = { version = "0.1.20", features = ["server-auto", "tokio"] }
http-body-util = "0.1.3"
itertools = "0.15.0"
jsonrpsee = { version = "0.26.0", features = ["server", "macros"] }
log = "0.4.33"
once_cell = "1.21.4"
sea-orm = { version = "1.1.20", default-features = false, features = [
    "macros",
    "runtime-tokio-rustls",
    "sqlx-postgres",
    "sqlx-sqlite",
] }
bytes = "1.12.0"
sea-orm-migration = { version = "1.1.20", default-features = false, features = [
    "runtime-tokio-rustls",
    "sqlx-postgres",
] }
sea-orm-cli = { version = "1.1.20", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

solana-client = "4.1.0-rc.1"
solana-pubkey = { version = "4.2.0", features = ["serde", "borsh"] }
solana-signature = "3.4.1"
solana-account = "4.3.1"
solana-clock = "3.1.0"
solana-transaction = "4.1.3"
solana-transaction-error = { version = "3.2.1", features = ["serde"] }
solana-commitment-config = "3.1.1"
solana-transaction-status-client-types = { version = "4.1.0-rc.1", features = ["agave-unstable-api"] }

light-poseidon = "0.4.0"
num-bigint = "0.4.6"

sqlx = { version = "0.8.6", features = [
    "runtime-tokio",
    "tls-rustls-ring-webpki",
    "postgres",
    "sqlite",
    "rust_decimal",
] }
thiserror = "2.0.18"
reqwest = { version = "0.13.4", features = ["form", "json", "stream"] }
tokio = { version = "1.52.3", features = [
    "macros",
    "rt-multi-thread",
    "time",
    "net",
    "signal",
] }
tower = { version = "0.5.3", features = ["util"] }
tower-http = { version = "0.7.0", default-features = false, features = ["cors"] }
tracing-subscriber = { version = "0.3.23", features = [
    "json",
    "env-filter",
    "ansi",
] }
utoipa = { version = "5.5.0", features = [
    "yaml",
    "non_strict_integers",
] }
yellowstone-grpc-client = "13.1.1"
yellowstone-grpc-proto = "12.5.0"
cadence = "1.8.0"
async-stream = "0.3.6"
rand = "0.10.1"
bincode = { version = "2.0.1", features = ["serde"] }
s3 = { package = "rust-s3", version = "0.37.2" }
cloud-storage = "0.11.1"
jsonwebtoken = "10.4.0"
rings-event = { git = "ssh://git@github.com/helius-labs/zolana.git", branch = "main", package = "zolana-event", features = ["program-test"] }
rings-interface = { git = "ssh://git@github.com/helius-labs/zolana.git", branch = "main", package = "zolana-interface", default-features = false, features = ["tree"] }
rings-tree = { git = "ssh://git@github.com/helius-labs/zolana.git", branch = "main", package = "zolana-tree" }

[profile.dev]
# Do not produce debug info for ~40% faster incremental compilation.
debug = 0
# Some standard library files already come precompiled with debuginfo. We strip it for faster linking
# and smaller binaries.
strip = "debuginfo"
