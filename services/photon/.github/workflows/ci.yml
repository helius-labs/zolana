name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Configure SSH for Cargo dependencies
        env:
          RINGS_DEPLOY_KEY: ${{ secrets.RINGS_DEPLOY_KEY || secrets.ZOLANA_DEPLOY_KEY }}
        run: |
          if [ -z "$RINGS_DEPLOY_KEY" ]; then
            echo "RINGS_DEPLOY_KEY secret is required to fetch protocol dependencies" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$RINGS_DEPLOY_KEY" > ~/.ssh/rings_deploy_key
          chmod 600 ~/.ssh/rings_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/rings_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.95.0
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-machete
        run: |
          cargo install cargo-machete --version 0.9.2 --locked

      - name: Install OpenAPI validator
        # open_api_tests calls update_docs(true), which runs `swagger-cli validate`.
        run: npm install -g @apidevtools/swagger-cli

      - name: Check unused dependencies
        run: cargo machete

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cargo run --bin photon-migration up

      - name: Run tests
        run: cargo test
