[package]
name = "zolana-transaction" # TODO: rename as zolana-sdk
version = "0.1.0"
description = "TSPP output UTXO serialization: plaintext and encrypted UTXO layouts for transfer and split, encrypted and decrypted via zolana-keypair."
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
zolana-interface = { workspace = true }
zolana-event = { workspace = true, features = ["program-test"] }
zolana-hasher = { workspace = true, features = ["poseidon"] }
zolana-keypair = { workspace = true }
async-trait = { workspace = true }
borsh = { workspace = true }
thiserror = { workspace = true }
wincode = { workspace = true }
light-poseidon = { workspace = true }
ark-bn254 = { workspace = true }
solana-address = { workspace = true }
p256 = { workspace = true }
rand = { workspace = true }
rayon = { workspace = true, optional = true }
solana-signature = { workspace = true }
num-bigint = { workspace = true }

[features]
parallel = ["dep:rayon"]

[dev-dependencies]
criterion = { workspace = true }
cucumber = { workspace = true }
tokio = { workspace = true }
proptest = { workspace = true }

[[test]]
name = "bdd"
harness = false

[[bench]]
name = "wallet_ops"
harness = false
