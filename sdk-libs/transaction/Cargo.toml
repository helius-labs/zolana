[package]
name = "rings-transaction" # TODO: rename as rings-sdk
version = "0.1.0"
description = "TSPP output UTXO serialization: plaintext and encrypted UTXO layouts for transfer and split, encrypted and decrypted via rings-keypair."
license = "Apache-2.0"
edition.workspace = true

[dependencies]
rings-interface = { workspace = true }
rings-event = { workspace = true, features = ["program-test"] }
rings-keypair = { workspace = true }
borsh = { workspace = true }
thiserror = { workspace = true }
wincode = { workspace = true }
light-poseidon = { workspace = true }
ark-bn254 = { workspace = true }
solana-address = { workspace = true }
p256 = { workspace = true }
rayon = { workspace = true, optional = true }
solana-signature = { workspace = true }
num-bigint = { workspace = true }

[features]
parallel = ["dep:rayon"]

[dev-dependencies]
criterion = { workspace = true }
cucumber = { workspace = true }
tokio = { workspace = true }
proptest = { workspace = true }

[[test]]
name = "bdd"
harness = false

[[bench]]
name = "wallet_ops"
harness = false
