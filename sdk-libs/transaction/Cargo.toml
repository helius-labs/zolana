[package]
name = "zolana-transaction"
version = "0.1.0"
description = "TSPP output UTXO serialization: plaintext and encrypted UTXO layouts for transfer and split, encrypted and decrypted via zolana-keypair."
license = "Apache-2.0"
edition.workspace = true

[dependencies]
zolana-interface = { workspace = true }
zolana-keypair = { workspace = true }
thiserror = { workspace = true }
wincode = { workspace = true }
light-poseidon = { workspace = true }
ark-bn254 = { workspace = true }
solana-address = { workspace = true }
rayon = { workspace = true, optional = true }

[features]
parallel = ["dep:rayon"]

[dev-dependencies]
criterion = { workspace = true }
cucumber = { workspace = true }
tokio = { workspace = true }
hex = { workspace = true }
proptest = { workspace = true }

[[test]]
name = "bdd"
harness = false

[[bench]]
name = "wallet_ops"
harness = false
