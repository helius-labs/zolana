[package]
name = "zolana-keypair"
version = "0.1.0"
description = "TSPP client keypairs: signing, nullifier, and viewing keys with HPKE-style encryption and view-tag derivation."
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
bs58 = { workspace = true, features = ["check"] }
solana-keypair = { workspace = true }
p256 = { workspace = true }
ed25519-dalek = { workspace = true }
aes = { workspace = true }
ctr = { workspace = true }
hkdf = { workspace = true }
hmac = { workspace = true }
zeroize = { workspace = true }
sha2 = { workspace = true }
zolana-hasher = { workspace = true, features = ["poseidon", "std"] }
rand = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
cucumber = { workspace = true }
tokio = { workspace = true }
hex = { workspace = true }

[[test]]
name = "bdd"
harness = false
