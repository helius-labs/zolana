[package]
name = "zolana-client"
version = "0.1.0"
description = "Client SDK for building, proving, and submitting Zolana private transactions."
edition.workspace = true
license.workspace = true
repository.workspace = true
autotests = false

[features]
default = []
indexer-api = ["dep:zolana-api"]
solana-rpc = ["dep:bs58", "dep:solana-rpc-client", "dep:solana-commitment-config"]
client = ["indexer-api", "solana-rpc"]

[dependencies]
zolana-interface = { workspace = true, features = ["solana"] }
zolana-event = { workspace = true, features = ["program-test"] }
zolana-hasher = { workspace = true, features = ["poseidon", "std"] }
zolana-keypair = { workspace = true }
zolana-transaction = { workspace = true }
zolana-api = { workspace = true, optional = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
solana-address = { workspace = true }
p256 = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
serde = { workspace = true }
serde_json = { workspace = true }
solana-bn254 = { workspace = true }
groth16-solana = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
bs58 = { workspace = true, optional = true }
solana-account = { workspace = true }
solana-clock = { workspace = true }
solana-compute-budget-interface = { workspace = true }
solana-hash = { workspace = true }
solana-instruction = { workspace = true }
solana-keypair = { workspace = true }
solana-message = { workspace = true }
solana-signature = { workspace = true }
solana-rpc-client-api = { workspace = true }
solana-rpc-client = { workspace = true, optional = true }
solana-commitment-config = { workspace = true, optional = true }
solana-pubkey = { workspace = true }
solana-signer = { workspace = true }
solana-transaction = { workspace = true, features = ["bincode"] }
solana-transaction-status-client-types = { workspace = true }
tokio = { workspace = true, features = ["time", "rt", "macros"] }

[dev-dependencies]
base64 = { workspace = true }
borsh = { workspace = true }
bs58 = { workspace = true }
zolana-hasher = { workspace = true, features = ["poseidon", "std"] }
zolana-merkle-tree = { workspace = true }
cucumber = { workspace = true }
futures = { workspace = true }
rand = { workspace = true }

[[test]]
name = "transaction_proving"
harness = false

[[test]]
name = "merge_proving"
path = "tests/merge/main.rs"
harness = false

[[test]]
name = "zone_authority_proving"
path = "tests/zone_authority/main.rs"
harness = false

[[test]]
name = "merge_zone_proving"
path = "tests/merge_zone/main.rs"
harness = false

[[test]]
name = "zone_transfer_proving"
path = "tests/zone_transfer/main.rs"
harness = false

[[test]]
name = "transfer_dummy"

[[test]]
name = "solana_rpc"
