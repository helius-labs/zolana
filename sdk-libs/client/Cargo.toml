[package]
name = "zolana-client"
version = "0.1.0"
description = "Host-side Groth16 witness builder for SPP transaction circuits (transfer / transfer-eddsa)."
license = "Apache-2.0"
edition.workspace = true

[dependencies]
zolana-keypair = { workspace = true }
zolana-transaction = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
solana-address = { workspace = true }
p256 = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
serde = { workspace = true }
serde_json = { workspace = true }
solana-bn254 = { workspace = true }
groth16-solana = { workspace = true }
rand = { workspace = true }
futures = { workspace = true }
solana-account = { workspace = true }
solana-clock = { workspace = true }
solana-hash = { workspace = true }
solana-instruction = { workspace = true }
solana-keypair = { workspace = true }
solana-message = { workspace = true }
solana-signature = { workspace = true }
solana-rpc-client-api = { workspace = true }
solana-transaction = { workspace = true }
solana-transaction-status-client-types = { workspace = true }

[dev-dependencies]
light-hasher = { workspace = true, features = ["poseidon", "std"] }
light-merkle-tree-reference = { workspace = true }
zolana-interface = { workspace = true }
cucumber = { workspace = true }
futures = { workspace = true }

[[test]]
name = "transfer_2_3"
harness = false
