[package]
name = "rings-program-test"
version = "0.23.0"
description = "Reusable LiteSVM program-test environment for Rings development."
license = "Apache-2.0"
edition.workspace = true

[features]
default = []
# Resolve the shielded-pool .so via SHIELDED_POOL_PROGRAM_PATH (env var or
# absolute path passed at construction time). The default search path is
# `<workspace>/target/deploy/shielded_pool_program.so`.

[dependencies]
litesvm = { workspace = true }
solana-account = { workspace = true }
solana-address = { workspace = true }
solana-hash = { workspace = true }
solana-instruction = { workspace = true }
solana-keypair = { workspace = true }
solana-message = { workspace = true }
solana-pubkey = { workspace = true }
solana-signature = { workspace = true }
solana-signer = { workspace = true }
solana-transaction = { workspace = true }
thiserror = { workspace = true }
rings-client = { workspace = true }
rings-interface = { workspace = true, features = ["solana"] }
rings-event = { workspace = true, features = ["program-test"] }
rings-keypair = { workspace = true }
rings-transaction = { workspace = true }
rings-hasher = { workspace = true, features = ["poseidon"] }
rings-merkle-tree = { workspace = true }

[[test]]
name = "indexer_events"
path = "tests/indexer_events.rs"
