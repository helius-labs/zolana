[package]
name = "zolana-user-registry"
version = "0.1.0"
description = "On-chain user registry: Solana pubkey to shielded payment keys and sync delegate"
edition.workspace = true
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "zolana_user_registry"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { workspace = true, features = ["init-if-needed"] }

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = [
    'cfg(target_os, values("solana"))',
    'cfg(feature, values("frozen-abi", "no-entrypoint"))',
]
