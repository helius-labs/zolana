[package]
name = "zolana-user-registry"
version = "0.1.0"
description = "On-chain user registry: Solana pubkey to shielded payment keys and sync delegate"
edition.workspace = true
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "zolana_user_registry"

[features]
default = []
bpf-entrypoint = []
no-entrypoint = []
cpi = ["no-entrypoint"]
test-sbf = []

[dependencies]
borsh = { workspace = true }
pinocchio = { workspace = true, features = ["cpi", "account-resize"] }
solana-address = { workspace = true, features = ["curve25519"] }
solana-msg = { workspace = true, default-features = false }
thiserror = { workspace = true }
zolana-interface = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["solana-address"]

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = [
    'cfg(target_os, values("solana"))',
    'cfg(feature, values("frozen-abi", "no-entrypoint"))',
]
