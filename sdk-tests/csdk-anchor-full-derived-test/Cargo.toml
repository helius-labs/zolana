[package]
name = "csdk-anchor-full-derived-test"
version = "0.1.0"
description = "Anchor program test using add_compressible_instructions macro for all compressible instructions"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "csdk_anchor_full_derived_test"

[package.metadata.cargo-machete]
ignored = [
    # Referenced by LightAccount and LightAccounts macro expansion.
    "light-compressed-account",
    "light-hasher",
    "solana-account-info",
    "solana-pubkey",
    # Enables Anchor IDL support for light-sdk-types used through light-account.
    "light-sdk-types",
    # Referenced by light_program macro expansion.
    "solana-program",
    "solana-program-error",
]

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build", "light-sdk-types/idl-build"]
test-sbf = []

[dependencies]
light-account = { workspace = true, features = ["anchor", "sha256"] }
anchor-lang = { workspace = true }
light-compressed-account = { workspace = true, features = ["solana"] }
light-hasher = { workspace = true, features = ["solana"] }
light-sdk-types = { workspace = true, optional = true }
solana-account-info = { workspace = true }
solana-program = { workspace = true }
solana-program-error = { workspace = true }
solana-pubkey = { workspace = true }

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = [
    'cfg(target_os, values("solana"))',
    'cfg(feature, values("frozen-abi", "no-entrypoint"))',
]
