[package]
name = "shielded-pool-tests"
version = "0.1.0"
edition.workspace = true
publish = false

[features]
default = []
localnet = [
    "dep:bs58",
    "dep:solana-commitment-config",
    "dep:solana-rpc-client",
    "dep:solana-signature",
    "dep:solana-transaction-status-client-types",
]

[dependencies]
bs58 = { workspace = true, optional = true }
shielded-pool-program = { workspace = true }
solana-commitment-config = { workspace = true, optional = true }
solana-instruction = { workspace = true }
solana-keypair = { workspace = true }
solana-message = { workspace = true }
solana-pubkey = { workspace = true }
solana-rpc-client = { workspace = true, optional = true }
solana-signature = { workspace = true, optional = true }
solana-signer = { workspace = true }
solana-transaction = { workspace = true }
solana-transaction-status-client-types = { workspace = true, optional = true }
zolana-interface = { workspace = true }
zolana-keypair = { workspace = true }
zolana-program-test = { workspace = true }
zolana-transaction = { workspace = true }

[[test]]
name = "localnet_proofless_shield"
path = "tests/localnet_proofless_shield.rs"
required-features = ["localnet"]
