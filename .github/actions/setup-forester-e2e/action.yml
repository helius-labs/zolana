name: Setup forester e2e environment
description: |
  Installs the full toolchain needed to run forester integration tests against
  a local validator: Rust + just (via setup-rust), Go for the repo-local prover,
  the Solana / Anza CLI (for `cargo build-sbf`), the repo-local zolana CLI,
  a pinned surfpool binary, and the Photon indexer binary built from the pinned
  `external/photon` submodule.
  Run after `actions/checkout` (with submodules enabled).

inputs:
  solana-version:
    description: Anza CLI version to install (must satisfy workspace solana-sdk = "2.3").
    required: false
    default: "2.3.0"
  shared-key:
    description: Swatinem rust-cache shared-key for cross-workflow cache reuse.
    required: false
    default: rust-stable
  private-libs-token:
    description: PAT forwarded to setup-rust for fetching private cargo git deps.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-rust
      with:
        shared-key: ${{ inputs.shared-key }}
        private-libs-token: ${{ inputs.private-libs-token }}
    - uses: actions/setup-go@v5
      with:
        go-version-file: prover/server/go.mod
        cache-dependency-path: prover/server/go.sum
    - name: Install Anza CLI ${{ inputs.solana-version }}
      shell: bash
      run: |
        sh -c "$(curl -sSfL https://release.anza.xyz/v${{ inputs.solana-version }}/install)"
        echo "${HOME}/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
    - name: Verify Solana toolchain
      shell: bash
      run: |
        export PATH="${HOME}/.local/share/solana/install/active_release/bin:$PATH"
        solana --version
        cargo build-sbf --version
    - name: Install surfpool (pinned in justfile)
      shell: bash
      run: just install-surfpool
    - name: Build Photon indexer (pinned to external/photon submodule SHA)
      shell: bash
      run: just install-photon
    - name: Build local prover server
      shell: bash
      run: just build-prover-server
    - name: Build zolana CLI
      shell: bash
      run: just build-zolana-cli
    - name: Resolve fixtures tag
      id: fixtures
      shell: bash
      run: |
        tag=$(tr -d '[:space:]' < .fixtures-version)
        echo "tag=${tag}" >> "$GITHUB_OUTPUT"
        echo "dir=${HOME}/.cache/zolana/fixtures/${tag}" >> "$GITHUB_OUTPUT"
    - name: Cache Light Protocol fixtures
      uses: actions/cache@v4
      with:
        path: ~/.cache/zolana/fixtures
        key: light-fixtures-${{ steps.fixtures.outputs.tag }}
    - name: Build Light Protocol local validator artifacts
      shell: bash
      run: just build-light-programs
    - name: Export local validator paths
      shell: bash
      run: |
        echo "ZOLANA_CLI_BIN=${GITHUB_WORKSPACE}/target/debug/zolana" >> "$GITHUB_ENV"
        echo "LIGHT_CLI_BIN=${GITHUB_WORKSPACE}/target/debug/zolana" >> "$GITHUB_ENV"
        echo "SURFPOOL_BIN=${GITHUB_WORKSPACE}/target/tools/surfpool" >> "$GITHUB_ENV"
        echo "PHOTON_BIN=${GITHUB_WORKSPACE}/target/tools/photon" >> "$GITHUB_ENV"
        echo "PROVER_BIN=${GITHUB_WORKSPACE}/target/prover-server" >> "$GITHUB_ENV"
        echo "LIGHT_PROTOCOL_PROGRAMS_DIR=${GITHUB_WORKSPACE}/target/deploy" >> "$GITHUB_ENV"
        echo "LIGHT_PROTOCOL_ACCOUNTS_DIR=${{ steps.fixtures.outputs.dir }}/accounts" >> "$GITHUB_ENV"
    - name: Verify local validator tools
      shell: bash
      run: |
        target/tools/photon --version
        target/debug/zolana --help
        target/tools/surfpool --version
        test -x target/prover-server
