name: Setup Rust
description: Install the workspace Rust toolchain, warm the Cargo cache, and (optionally) install `just`. Run after actions/checkout.

inputs:
  shared-key:
    description: Swatinem rust-cache shared-key for cross-workflow cache reuse.
    required: false
    default: rust-workspace
  install-just:
    description: Install the `just` task runner via taiki-e/install-action.
    required: false
    default: "true"
  private-libs-token:
    description: |
      GitHub token with read access to helius-labs/privacy-program-libs (and any
      other private repos referenced as cargo git deps). The workflow-issued
      GITHUB_TOKEN only scopes to the current repo, so private cross-repo
      dependencies need a PAT or fine-grained token passed in via secrets.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - if: inputs.private-libs-token != ''
      name: Configure git auth for private cargo git deps
      shell: bash
      env:
        TOKEN: ${{ inputs.private-libs-token }}
      run: |
        git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
    - name: Install workspace Rust toolchain
      shell: bash
      run: rustup show active-toolchain
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-key }}
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - if: inputs.install-just == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: just
