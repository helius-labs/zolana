name: Setup Rust
description: Install Rust 1.95.0, warm the Cargo cache, and optionally install `just`. Run after actions/checkout.

inputs:
  components:
    description: Comma-separated Rust toolchain components (e.g. "rustfmt,clippy")
    required: false
    default: ""
  shared-key:
    description: Swatinem rust-cache shared-key for cross-workflow cache reuse.
    required: false
    default: rust-1.95.0
  install-just:
    description: Install the `just` task runner via taiki-e/install-action.
    required: false
    default: "true"
  private-libs-token:
    description: |
      GitHub token with read access to helius-labs/privacy-program-libs (and any
      other private repos referenced as cargo git deps). The workflow-issued
      GITHUB_TOKEN only scopes to the current repo, so private cross-repo
      dependencies need a PAT or fine-grained token passed in via secrets.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - if: inputs.private-libs-token != ''
      name: Configure git auth for private cargo git deps
      shell: bash
      env:
        TOKEN: ${{ inputs.private-libs-token }}
      run: |
        git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
    - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
      with:
        toolchain: 1.95.0
        components: ${{ inputs.components }}
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        shared-key: ${{ inputs.shared-key }}
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - if: inputs.install-just == 'true'
      uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
      with:
        tool: just
