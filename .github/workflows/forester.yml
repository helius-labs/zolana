name: forester

on:
  push:
    branches: [main]
    paths:
      - "forester/**"
      - "programs/**"
      - "program-libs/**"
      - "program-tests/**"
      - "sdk-libs/program-test/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/forester.yml"
      - ".github/actions/setup-rust/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "forester/**"
      - "programs/**"
      - "program-libs/**"
      - "program-tests/**"
      - "sdk-libs/program-test/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/forester.yml"
      - ".github/actions/setup-rust/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

# Forester e2e + compressible jobs were removed in the shielded-pool reshape.
# The forester crate is currently a CLI skeleton; foresting logic and its
# integration tests will be reintroduced against the new combined tree type.
jobs:
  unit:
    name: forester / compile
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: cargo check -p forester --all-targets
