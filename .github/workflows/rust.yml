name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
      - ".gitmodules"
  pull_request:
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
      - ".gitmodules"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git auth for private cargo git deps
        env:
          TOKEN: ${{ secrets.PRIVATE_LIBS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: machete
          install-just: "false"
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete --skip-target-dir

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just clippy

  check:
    name: cargo check (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just check-all

  test-scaffold:
    name: tests / scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just test-scaffold
