name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"
  SBF_TOOLS_VERSION: v1.54

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure git auth for private cargo git deps
        env:
          TOKEN: ${{ secrets.PRIVATE_LIBS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Install workspace Rust toolchain
        run: rustup show active-toolchain
      - run: cargo fmt --all -- --check

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: machete
          install-just: "false"
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-machete
      - run: cargo machete --skip-target-dir

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just clippy

  check:
    name: cargo check (workspace)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just check-all

  test-cli:
    name: tests / cli
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just test-cli

  test-shielded-pool:
    name: tests / shielded-pool
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      AGAVE_VERSION: v4.0.2
      # The spawned prover lazily fetches proving keys from the transfer-keys-v13
      # release via the GitHub REST API using GH_TOKEN.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: prover/server/go.mod
          cache-dependency-path: prover/server/go.sum
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: litesvm
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install pinned SBF platform tools
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only
      - name: Cache proving keys
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: prover/server/proving-keys
          key: proving-keys-transfer-keys-v13
      - run: just test-shielded-pool

  test-sdk-libs:
    name: tests / sdk-libs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just test-sdk-libs

  test-programs:
    name: tests / programs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      AGAVE_VERSION: v4.0.2
      # The spawned prover lazily fetches proving keys from the transfer-keys-v13
      # release via the GitHub REST API using GH_TOKEN.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: prover/server/go.mod
          cache-dependency-path: prover/server/go.sum
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: programs
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install pinned SBF platform tools
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only
      - name: Cache proving keys
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: prover/server/proving-keys
          key: proving-keys-transfer-keys-v13
      - run: just test-programs

  build-photon:
    name: build / photon
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          install-just: "false"
          shared-key: localnet-photon
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: cargo build --locked --release -p photon-indexer --bin photon
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: photon-linux-x86_64-${{ github.sha }}
          path: target/release/photon
          if-no-files-found: error
          retention-days: 1

  test-localnet-photon:
    name: tests / localnet photon / ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-photon
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: e2e
            recipe: test-localnet-e2e-photon
          - name: spp lifecycle/decode
            recipe: test-spp-validator-lifecycle-decode
          - name: spp merge
            recipe: test-spp-validator-merge
          - name: spp randomized
            recipe: test-spp-validator-randomized
          - name: zone lifecycle
            recipe: test-zone-validator
          - name: swap lifecycle
            recipe: test-swap-validator
    env:
      AGAVE_VERSION: v4.0.2
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ZOLANA_PHOTON_BIN: target/bin/photon
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: prover/server/go.mod
          cache-dependency-path: prover/server/go.sum
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: localnet-photon
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install pinned SBF platform tools
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only
      - name: Cache proving keys
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: prover/server/proving-keys
          key: proving-keys-transfer-keys-v13
      - name: Download workspace Photon
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: photon-linux-x86_64-${{ github.sha }}
          path: target/bin
      - run: chmod 0755 "$ZOLANA_PHOTON_BIN"
      - name: Cache Squads smart account binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: squads-cache
        with:
          path: target/deploy/squads_smart_account_program.so
          key: squads-smart-account-SMRTzfY6DfH5ik3TKiyLFfXexV8uSG3d2UksSCYdunG
      - name: Fetch Squads smart account binary
        if: steps.squads-cache.outputs.cache-hit != 'true'
        run: just fetch-smart-account
      - run: just ${{ matrix.recipe }}
      - name: Dump prover and photon logs on failure
        if: failure()
        run: |
          # Services log under a test-ledger dir whose location depends on the
          # spawning process's cwd, so search rather than assume the repo root.
          echo "=== prover-server.log ==="
          find . -name prover-server.log -exec sh -c 'echo "--- {} ---"; tail -200 "{}"' \; 2>/dev/null \
            || echo "(no prover log)"
          echo "=== photon log ==="
          find . -name photon.log -exec sh -c 'echo "--- {} ---"; tail -100 "{}"' \; 2>/dev/null \
            || echo "(no photon log)"

  test-user-registry-litesvm:
    name: tests / user-registry litesvm
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      AGAVE_VERSION: v4.0.2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: litesvm
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install pinned SBF platform tools
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only
      - run: just test-user-registry-litesvm

  test-client-integration:
    name: tests / client integration
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      # The spawned prover lazily fetches proving keys from the transfer-keys-v13
      # release via the GitHub REST API using GH_TOKEN.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: prover/server/go.mod
          cache-dependency-path: prover/server/go.sum
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      # Avoid re-downloading proving keys every run; the prover's offline
      # CHECKSUM path reuses them on a cache hit.
      - name: Cache proving keys
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: prover/server/proving-keys
          key: proving-keys-transfer-keys-v13
      - run: just test-client-integration
