name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
      - ".gitmodules"
  pull_request:
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
      - ".gitmodules"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: machete
          install-just: "false"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete --skip-target-dir

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: just clippy

  check:
    name: cargo check (workspace + SBF fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
      - run: just check-all

  photon-api-codegen:
    name: photon-api OpenAPI regen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
      - run: just check-photon-generate

  test-scaffold:
    name: tests / scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: just test-scaffold

  test-compressed-token:
    name: tests / compressed-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: just test-compressed-token

  test-sdk-libs:
    name: tests / sdk-libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: just test-sdk-libs
