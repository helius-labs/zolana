name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "prover/server/**"
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Configure git auth for private cargo git deps
        env:
          TOKEN: ${{ secrets.PRIVATE_LIBS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: machete
          install-just: "false"
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete --skip-target-dir

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just clippy

  check:
    name: cargo check (workspace)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just check-all

  test-shielded-pool:
    name: tests / shielded-pool
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just test-shielded-pool

  test-sdk-libs:
    name: tests / sdk-libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - run: just test-sdk-libs

  test-litesvm:
    name: tests / litesvm
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      AGAVE_VERSION: v4.0.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: litesvm
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - run: cargo build-sbf --version
      - run: just test-litesvm

  test-user-registry-litesvm:
    name: tests / user-registry litesvm
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      AGAVE_VERSION: v4.0.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: litesvm
          private-libs-token: ${{ secrets.PRIVATE_LIBS_TOKEN }}
      - name: Install Anza CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - run: cargo build-sbf --version
      - run: just test-user-registry-litesvm
