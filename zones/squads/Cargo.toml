# Nested workspace for the Squads zone. The root repo `Cargo.toml` excludes
# `zones/squads` so cargo does not absorb these crates; this workspace has its
# own lockfile and depends on main-repo crates by relative path.
[workspace]
members = ["client", "integration-tests", "interface", "program", "sdk"]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"

[workspace.dependencies]
# Squads-local crates.
zolana-squads-interface = { path = "interface", version = "0.1.0" }
zolana-squads-program = { path = "program", version = "0.1.0", default-features = false, features = ["no-entrypoint"] }
zolana-squads-sdk = { path = "sdk", version = "0.1.0" }
zolana-squads-client = { path = "client", version = "0.1.0" }

# Main-repo crates (by relative path).
zolana-event = { path = "../../program-libs/event", version = "0.1.0" }
zolana-interface = { path = "../../program-libs/interface", version = "0.1.0", default-features = false }
zolana-keypair = { path = "../../sdk-libs/keypair", version = "0.1.0" }
zolana-transaction = { path = "../../sdk-libs/transaction", version = "0.1.0" }
zolana-client = { path = "../../sdk-libs/client", version = "0.1.0" }
zolana-hasher = { path = "../../program-libs/hasher", version = "5.0.0", default-features = false }
zolana-merkle-tree = { path = "../../sdk-libs/merkle-tree", version = "4.0.0" }
zolana-account-checks = { path = "../../program-libs/account-checks", version = "0.8.0", default-features = false }
zolana-program-test = { path = "../../sdk-libs/program-test", version = "0.23.0" }
zolana-test-utils = { path = "../../program-tests/test-utils", version = "0.1.0" }
zolana-user-registry-interface = { path = "../../program-libs/user-registry-interface", version = "0.1.0" }

# External crates (versions mirror the root workspace).
groth16-solana = { git = "https://github.com/Lightprotocol/groth16-solana", rev = "6f44fe18ece7e9f2d09141707f7822e9321c7b66", features = ["bsb22"] }
pinocchio = "0.11"
pinocchio-system = "0.6.0"
anyhow = "1.0"
base64 = "0.13"
borsh = { version = "1.5", default-features = false, features = ["derive"] }
bytemuck = { version = "1.19.0", features = ["derive"] }
cucumber = "0.22"
futures = "0.3.31"
litesvm = "0.12"
p256 = { version = "0.13", default-features = false, features = ["ecdh", "arithmetic", "ecdsa", "hash2curve", "std"] }
rand = "0.8.5"
solana-account = "3.4"
solana-commitment-config = "3.1"
solana-rpc-client = "4.0.0-rc.0"
solana-rpc-client-api = "4.0.0-rc.0"
solana-address = { version = "2.6", features = ["atomic", "borsh", "bytemuck", "copy", "decode", "wincode"] }
solana-address-lookup-table-interface = { version = "3.0", features = ["bytemuck", "bincode"] }
solana-compute-budget-interface = "3.0"
solana-instruction = "3.4"
solana-keypair = "3.1.2"
solana-message = "3.1"
solana-pubkey = { version = "4.2", features = ["curve25519"] }
solana-program-error = "3.0"
solana-signer = "3.0"
solana-signature = "3.4"
solana-transaction = "3.1"
solana-transaction-error = "3.0"
thiserror = "2.0"
wincode = { version = "0.5", features = ["derive"] }
