[workspace]
members = [
    "forester",
    "forester-utils",
    "program-libs/interface",
    "program-tests/create-address-test-program",
    "program-tests/registry",
    "program-tests/shielded-pool",
    "program-tests/utils",
    "programs/account-compression",
    "programs/compressed-token/anchor",
    "programs/compressed-token/program",
    "programs/registry",
    "programs/shielded-pool",
    "anchor-programs/system",
    "prover/client",
    "sdk-libs/account",
    "sdk-libs/account-pinocchio",
    "sdk-libs/cli",
    "sdk-libs/client",
    "sdk-libs/compressed-token-sdk",
    "sdk-libs/event",
    "sdk-libs/instruction-decoder",
    "sdk-libs/instruction-decoder-derive",
    "sdk-libs/macros",
    "sdk-tests/csdk-anchor-full-derived-test",
    "sdk-libs/photon-api",
    "sdk-libs/program-test",
    "sdk-libs/sdk",
    "sdk-libs/sdk-pinocchio",
    "sdk-libs/sdk-types",
    "sdk-libs/token-client",
    "sdk-libs/token-pinocchio",
    "sdk-libs/token-sdk",
    "sdk-libs/token-types",
    "xtask",
]
default-members = [
    "forester",
    "forester-utils",
    "prover/client",
    "sdk-libs/photon-api",
    "program-libs/interface",
    "programs/shielded-pool",
]
exclude = ["external/photon"]
resolver = "2"

[workspace.package]
edition = "2021"

[workspace.dependencies]
# Solana platform-tools Cargo 1.84 cannot build edition2024 crates pulled by
# newer time-core releases.
time = ">=0.3, <0.3.46"

# Local workspace crates kept in this reduced monorepo.
account-compression = { path = "programs/account-compression", version = "2.0.0", features = ["cpi"] }
anchor-compressed-token = { path = "programs/compressed-token/anchor", version = "2.0.0", default-features = false, features = ["cpi", "custom-heap"] }
create-address-test-program = { path = "program-tests/create-address-test-program", version = "1.0.0", features = ["cpi"] }
csdk-anchor-full-derived-test = { path = "sdk-tests/csdk-anchor-full-derived-test", version = "0.1.0", features = ["no-entrypoint"] }
forester-utils = { path = "forester-utils", version = "2.0.0" }
zolana-interface = { path = "program-libs/interface", version = "0.1.0" }
shielded-pool-program = { path = "programs/shielded-pool", version = "0.1.0" }
light-compressed-token = { path = "programs/compressed-token/program", version = "2.1.0", features = ["cpi"] }
light-compressed-token-sdk = { path = "sdk-libs/compressed-token-sdk", version = "0.23.0" }
light-client = { path = "sdk-libs/client", version = "0.23.0" }
light-account = { path = "sdk-libs/account", version = "0.23.0", default-features = false }
light-account-pinocchio = { path = "sdk-libs/account-pinocchio", version = "0.23.0", default-features = false }
light-test-utils = { path = "program-tests/utils", version = "1.2.1" }
light-program-test = { path = "sdk-libs/program-test", version = "0.23.0" }
light-prover-client = { path = "prover/client", version = "8.0.0" }
light-registry = { path = "programs/registry", version = "2.1.0", features = ["cpi"] }
light-system-program-anchor = { path = "anchor-programs/system", version = "2.0.0", features = ["cpi"] }
light-token = { path = "sdk-libs/token-sdk", version = "0.23.0" }
light-token-client = { path = "sdk-libs/token-client", version = "0.23.0" }
light-token-pinocchio = { path = "sdk-libs/token-pinocchio", version = "0.23.0" }
photon-api = { path = "sdk-libs/photon-api", version = "0.56.0" }

# Published Light Protocol crates.
aligned-sized = "1.1.0"
light-array-map = "0.2.0"
light-account-checks = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.8.0", default-features = false }
light-batched-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.11.0" }
light-bloom-filter = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.6.0" }
light-bounded-vec = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "2.0.1" }
light-compressed-account = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.11.0", default-features = false }
light-compressible = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.6.0", default-features = false }
light-concurrent-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "5.0.0" }
light-hash-set = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "4.0.0" }
light-hasher = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "5.0.0", default-features = false }
light-heap = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "2.0.0" }
light-indexed-array = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.3.0" }
light-indexed-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "5.0.0" }
light-instruction-decoder = { path = "sdk-libs/instruction-decoder", version = "0.23.0" }
light-instruction-decoder-derive = { path = "sdk-libs/instruction-decoder-derive", version = "0.4.0" }
light-event = { path = "sdk-libs/event", version = "0.23.1" }
light-macros = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "2.2.0" }
light-merkle-tree-metadata = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.11.0" }
light-merkle-tree-reference = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "4.0.0" }
light-poseidon = "0.4.0"
light-program-profiler = "0.1.1"
light-verifier = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "10.0.0" }
light-sdk = { path = "sdk-libs/sdk", version = "0.23.0" }
light-sdk-pinocchio = { path = "sdk-libs/sdk-pinocchio", version = "0.23.0" }
light-sdk-macros = { path = "sdk-libs/macros", version = "0.23.0" }
light-sdk-types = { path = "sdk-libs/sdk-types", version = "0.23.0", default-features = false }
light-sparse-merkle-tree = "0.3.0"
light-token-interface = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.5.0" }
light-token-types = { path = "sdk-libs/token-types", version = "0.23.0" }
light-zero-copy = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main", version = "0.6.0", default-features = false }

# Solana and SPL.
anchor-lang = "1.0.2"
anchor-spl = "1.0.2"
borsh = { version = "1.5", default-features = false, features = ["derive"] }
solana-account = "3.4"
solana-account-info = "3.1"
solana-account-decoder = "4.0.0-rc.0"
solana-account-decoder-client-types = "4.0.0-rc.0"
solana-address-lookup-table-interface = { version = "3.0", features = ["bytemuck", "bincode"] }
solana-banks-client = { version = "4.0.0-rc.0", features = ["agave-unstable-api"] }
solana-bn254 = "3.2.1"
solana-client = "4.0.0-rc.0"
solana-clock = "3.0"
solana-commitment-config = "3.1"
solana-compute-budget = "3.1"
solana-compute-budget-interface = "3.0"
solana-cpi = "3.1"
solana-epoch-info = "3.1"
solana-hash = "4.3"
solana-instruction = "3.4"
solana-keypair = "3.1.2"
solana-loader-v3-interface = "8.0"
solana-message = "3.1"
solana-msg = "3.1"
solana-program = "4.0"
solana-program-error = "3.0"
solana-program-pack = "3.1"
solana-pubkey = "4.2"
solana-rent = "4.2"
solana-rpc-client = "4.0.0-rc.0"
solana-rpc-client-api = "4.0.0-rc.0"
solana-security-txt = "1.1.2"
solana-sdk = "3.0"
solana-signature = "3.4"
solana-signer = "3.0"
solana-system-interface = { version = "3.2", features = ["bincode"] }
solana-sysvar = { version = "4.0", features = ["bincode"] }
solana-transaction = "3.1"
solana-transaction-error = "3.0"
solana-transaction-status = "4.0.0-rc.0"
solana-transaction-status-client-types = "4.0.0-rc.0"
spl-token = "9.0"
spl-token-2022 = { version = "10.0", features = ["no-entrypoint"] }
spl-token-2022-interface = "2.0"
spl-pod = "0.7"
pinocchio = "0.10"
pinocchio-pubkey = "0.3.0"
pinocchio-system = "0.5.0"
pinocchio-token-program = { git = "https://github.com/Lightprotocol/token", rev = "f7bee9bbc8039c224a88ea76e9ae2edd78e0f9c3" }

# Async, HTTP, logging, and utilities.
anyhow = "1.0"
async-channel = "2.5"
async-trait = "0.1.82"
arrayvec = "0.7"
base64 = "0.13"
bb8 = "0.8.6"
bitvec = { version = "1.0.1", default-features = false }
bs58 = "0.5.1"
bytemuck = "1.19.0"
chrono = "0.4"
dashmap = "6.1.0"
darling = "0.21"
env_logger = "0.11"
futures = "0.3.31"
governor = "0.8.0"
heck = "0.5"
hex = "0.4"
lazy_static = "1.5.0"
log = "0.4"
litesvm = "0.12"
num-bigint = "0.4.6"
num-traits = "0.2.19"
proc-macro2 = "1.0"
quote = "1.0"
rand = "0.8.5"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serial_test = "3.2.0"
sha2 = "0.10"
syn = { version = "2.0", features = ["visit-mut", "full"] }
tabled = "0.20"
thiserror = "2.0"
tinyvec = "1.10.0"
tokio = { version = "1.48.0", features = ["rt", "macros", "rt-multi-thread"] }
tracing = "0.1.41"
tracing-appender = "0.2.3"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "json"] }
zerocopy = "0.8.25"

# Prover math/crypto.
ark-bn254 = "0.5"
ark-serialize = "0.5"
ark-std = "0.5"

[patch.crates-io]
groth16-solana = { git = "https://github.com/Lightprotocol/groth16-solana", rev = "4e6cacff2f4ff53744fda0509f5e62545fd99aa6" }
account-compression = { path = "programs/account-compression" }
light-compressed-token = { path = "programs/compressed-token/program" }
light-compressed-token-sdk = { path = "sdk-libs/compressed-token-sdk" }
light-account = { path = "sdk-libs/account" }
light-account-pinocchio = { path = "sdk-libs/account-pinocchio" }
light-account-checks = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-batched-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-bloom-filter = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-bounded-vec = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-compressed-account = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-compressible = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-concurrent-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-hash-set = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-hasher = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-indexed-array = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-indexed-merkle-tree = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-instruction-decoder = { path = "sdk-libs/instruction-decoder" }
light-instruction-decoder-derive = { path = "sdk-libs/instruction-decoder-derive" }
light-macros = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-merkle-tree-metadata = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-token-interface = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-verifier = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-zero-copy = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-client = { path = "sdk-libs/client" }
light-event = { path = "sdk-libs/event" }
light-heap = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-merkle-tree-reference = { git = "https://github.com/helius-labs/privacy-program-libs", branch = "main" }
light-program-test = { path = "sdk-libs/program-test" }
light-sdk = { path = "sdk-libs/sdk" }
light-sdk-pinocchio = { path = "sdk-libs/sdk-pinocchio" }
light-sdk-macros = { path = "sdk-libs/macros" }
light-sdk-types = { path = "sdk-libs/sdk-types" }
light-registry = { path = "programs/registry" }
light-system-program-anchor = { path = "anchor-programs/system" }
light-token = { path = "sdk-libs/token-sdk" }
light-token-client = { path = "sdk-libs/token-client" }
light-token-pinocchio = { path = "sdk-libs/token-pinocchio" }
light-token-types = { path = "sdk-libs/token-types" }

[profile.dev]
opt-level = 0
debug = "line-tables-only"
strip = "none"

[profile.dev.package.syn]
opt-level = 3

[profile.dev.package.proc-macro2]
opt-level = 3

[profile.dev.package.quote]
opt-level = 3

[profile.dev.package.serde_derive]
opt-level = 3

[profile.dev.package.ark-ff-macros]
opt-level = 3

[profile.dev.package.ark-ff-asm]
opt-level = 3

[profile.release]
overflow-checks = true
