[package]
name = "light-batched-merkle-tree"
version = "0.11.0"
description = "Batch Merkle tree implementation."
readme = "README.md"
repository = "https://github.com/helius-labs/privacy-program-libs"
license = "Apache-2.0"
edition = "2021"

[package.metadata.cargo-machete]
ignored = [
    # Used through feature-gated Solana account traits and cfg paths.
    "solana-account-info",
    "solana-sysvar",
]

[features]
default = ["solana"]
test-only = []
solana = [
    "solana-program-error",
    "solana-account-info",
    "solana-sysvar",
    "solana-msg",
    "light-hasher/solana",
    "light-hasher/keccak",
    "light-bloom-filter/solana",
    "light-merkle-tree-metadata/solana",
]
pinocchio = [
    "dep:pinocchio",
    "light-hasher/pinocchio",
    "light-bloom-filter/pinocchio",
    "light-merkle-tree-metadata/pinocchio",
]

[dependencies]
light-account-checks = { workspace = true }
aligned-sized = { workspace = true }
solana-program-error = { workspace = true, optional = true }
solana-sysvar = { workspace = true, optional = true }
solana-msg = { workspace = true, optional = true, features = ["alloc"] }
solana-account-info = { workspace = true, optional = true }
solana-address = { workspace = true }
light-zero-copy-vec = { workspace = true }
wincode = { workspace = true }
light-hasher = { workspace = true, features = ["poseidon", "keccak"] }
light-bloom-filter = { workspace = true }
light-verifier = { workspace = true }
thiserror = { workspace = true }
light-merkle-tree-metadata = { workspace = true }
borsh = { workspace = true }
bytemuck = { workspace = true, features = ["derive"] }
zerocopy = { workspace = true }
pinocchio = { workspace = true, optional = true }

[dev-dependencies]
rand = { workspace = true }
light-merkle-tree-reference = { workspace = true }
light-account-checks = { workspace = true, features = ["test-only"] }
light-hasher = { workspace = true, features = ["keccak"] }
num-bigint = { workspace = true }
num-traits = { workspace = true }
ark-bn254 = { workspace = true }
ark-ff = { workspace = true }

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(target_os, values("solana"))']
