[package]
name = "zolana-interface"
version = "0.1.0"
edition.workspace = true
publish = false

[features]
default = ["full"]
events = []
full = ["events", "instructions", "state-tree", "verifying-keys"]
instructions = ["events", "dep:light-hasher", "dep:wincode"]
solana = ["dep:solana-instruction", "instructions"]
state-tree = ["dep:zolana-tree"]
verifying-keys = ["dep:groth16-solana"]

[dependencies]
borsh = { workspace = true }
bytemuck = { workspace = true }
solana-instruction = { workspace = true, optional = true }
solana-pubkey = { workspace = true }
groth16-solana = { workspace = true, optional = true }
light-hasher = { workspace = true, optional = true }
wincode = { workspace = true, optional = true }
zolana-tree = { workspace = true, optional = true }
